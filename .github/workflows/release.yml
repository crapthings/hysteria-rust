name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release tag
    runs-on: ubuntu-latest
    steps:
      - name: Check out Rust implementation
        uses: actions/checkout@v7

      - name: Check out pinned Go implementation
        uses: actions/checkout@v7
        with:
          repository: apernet/hysteria
          ref: f2ad1de5da52a1da9622285a1d61553ddaa41f21
          path: upstream-go

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, rustfmt

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.25.1
          cache-dependency-path: upstream-go/app/go.sum

      - name: Match tag to Cargo version
        shell: bash
        run: |
          set -euo pipefail
          version="$(cargo metadata --locked --no-deps --format-version 1 | python3 -c 'import json, sys; print(next(p["version"] for p in json.load(sys.stdin)["packages"] if p["name"] == "hysteria-cli"))')"
          test "${GITHUB_REF_NAME}" = "v${version}"

      - name: Check format
        run: cargo fmt --all -- --check

      - name: Test Rust workspace
        run: cargo test --locked --workspace

      - name: Lint Rust workspace
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Build pinned Go binary
        working-directory: upstream-go/app
        run: go build -trimpath -o "${RUNNER_TEMP}/hysteria-go" .

      - name: Test Go/Rust interoperability
        env:
          HYSTERIA_GO_BIN: ${{ runner.temp }}/hysteria-go
          HYSTERIA_DISABLE_UPDATE_CHECK: "1"
        run: cargo test --locked --package hysteria-cli --test go_interop -- --nocapture

  native:
    name: Native release (${{ matrix.label }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            variant: baseline
          - label: linux-x64-avx
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            variant: avx
          - label: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            variant: baseline
          - label: macos-x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            variant: baseline
          - label: macos-x64-avx
            runner: macos-15-intel
            target: x86_64-apple-darwin
            variant: avx
          - label: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin
            variant: baseline
          - label: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            variant: baseline
          - label: windows-x64-avx
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            variant: avx
          - label: windows-arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            variant: baseline
          - label: windows-x86
            runner: windows-latest
            target: i686-pc-windows-msvc
            variant: baseline
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: ${{ matrix.target }}

      - name: Package native binary
        run: python scripts/package_rust.py --target ${{ matrix.target }} --variant ${{ matrix.variant }}

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.label }}
          path: build/rust/*
          if-no-files-found: error
          retention-days: 1

  cross:
    name: Cross release (${{ matrix.label }})
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86
            target: i686-unknown-linux-gnu
            toolchain: 1.88.0
          - label: linux-arm
            target: armv7-unknown-linux-gnueabihf
            toolchain: 1.88.0
          - label: linux-armv5
            target: armv5te-unknown-linux-gnueabi
            toolchain: 1.88.0
          - label: linux-s390x
            target: s390x-unknown-linux-gnu
            toolchain: 1.88.0
          - label: linux-mipsle
            target: mipsel-unknown-linux-gnu
            toolchain: nightly-2026-07-15
          - label: linux-mipsle-softfloat
            target: mipsel-unknown-linux-musl
            toolchain: nightly-2026-07-15
          - label: linux-riscv64
            target: riscv64gc-unknown-linux-gnu
            toolchain: 1.88.0
          - label: linux-loong64
            target: loongarch64-unknown-linux-gnu
            toolchain: 1.88.0
          - label: android-x86
            target: i686-linux-android
            toolchain: 1.88.0
          - label: android-x64
            target: x86_64-linux-android
            toolchain: 1.88.0
          - label: android-armv7
            target: armv7-linux-androideabi
            toolchain: 1.88.0
          - label: android-arm64
            target: aarch64-linux-android
            toolchain: 1.88.0
          - label: freebsd-x86
            target: i686-unknown-freebsd
            toolchain: 1.88.0
          - label: freebsd-x64
            target: x86_64-unknown-freebsd
            toolchain: 1.88.0
          - label: freebsd-x64-avx
            target: x86_64-unknown-freebsd
            toolchain: 1.88.0
            variant: avx
          - label: freebsd-arm64
            target: aarch64-unknown-freebsd
            toolchain: nightly-2026-07-15
          - label: freebsd-armv7
            target: armv7-unknown-freebsd
            toolchain: nightly-2026-07-15
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Setup nightly with rust-src
        if: startsWith(matrix.toolchain, 'nightly')
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2026-07-15
          components: rust-src

      - name: Install pinned Cross
        run: cargo install cross --git https://github.com/cross-rs/cross --rev 154b4ead7e639c7597d9e4e626b9c1c1e37608c0 --locked

      - name: Package cross-compiled binary
        run: python scripts/package_rust.py --builder cross --toolchain ${{ matrix.toolchain }} --target ${{ matrix.target }} --variant ${{ matrix.variant || 'baseline' }}

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.label }}
          path: build/rust/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub release
    needs:
      - native
      - cross
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Verify checksums and asset count
        working-directory: release-assets
        shell: bash
        run: |
          set -euo pipefail
          test "$(find . -maxdepth 1 -type f | wc -l)" -eq 54
          for checksum in *.sha256; do
            sha256sum --check "$checksum"
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          args=(--verify-tag --generate-notes --title "${GITHUB_REF_NAME}")
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            args+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" release-assets/* "${args[@]}"
